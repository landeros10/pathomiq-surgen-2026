# ─────────────────────────────────────────────────────────────────────────────
# SurGen Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Paths ──────────────────────────────────────────────────────────────────────
# Switch embeddings_dir to "gs://your-bucket/surgen/embeddings/" for GCP.
# All other paths are relative to the project root.
paths:
  embeddings_dir: "embeddings/"          # local; or gs://bucket/path/ for GCP
  data_dir: "data/splits/"               # official split CSVs
  models_dir: "models/"
  logs_dir: "logs/mlflow"
  results_dir: "results/"

# ── Dataset ────────────────────────────────────────────────────────────────────
data:
  cohorts:
    - SurGen    # SR386 + SR1482 combined (489/165/165 train/val/test, 79 dMMR)
  embedding_dim: 1024               # UNI patch embedding dimension
  train_split: "SurGen_msi_train.csv"
  val_split: "SurGen_msi_validate.csv"
  test_split: "SurGen_msi_test.csv"
  label_column: "label"             # 0 = MSS/pMMR, 1 = MSI/dMMR
  slide_id_column: "case_id"

# ── Model ──────────────────────────────────────────────────────────────────────
model:
  input_dim: 1024
  hidden_dim: 512
  transformer_layers: 2
  num_heads: 2
  ffn_dim: 2048
  dropout: 0.15
  layer_norm_eps: 1.0e-5            # Table 5 of the paper
  aggregation: "mean"               # mean pooling over patch tokens

# ── Training ───────────────────────────────────────────────────────────────────
training:
  epochs: 200
  lr: 1.0e-4
  batch_size: 1                     # one slide at a time (variable patch count)
  optimizer: "adam"
  random_seed: 1                    # matches GitHub training script default
  save_every: 20                    # save checkpoint every N epochs

# ── MLflow ─────────────────────────────────────────────────────────────────────
mlflow:
  experiment_name: "mmr-prediction-baseline"
  tracking_uri: "sqlite:///mlflow.db"   # local SQLite; change for remote server

# ── Evaluation ─────────────────────────────────────────────────────────────────
# Class prior ~8% MSI/dMMR; threshold 0.0119 reflects the true prevalence.
evaluation:
  thresholds: [0.0119, 0.25, 0.50, 0.75]

# ── Synthetic data (pipeline testing) ─────────────────────────────────────────
synthetic:
  num_slides: 10
  patches_per_slide: 100
  embedding_dim: 1024
  output_dir: "embeddings/synthetic/"
  data_dir: "data/synthetic/"
  msi_fraction: 0.20               # higher than real 8% for testing class balance
  seed: 42

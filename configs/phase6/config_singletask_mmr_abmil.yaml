# Phase 6 single-task MMR config — ABMIL aggregation, cosine LR, grad accum 16
# MILTransformer (T=1) with attention pooling, class weighting.
# Required for Step 7 attention comparison: single-task vs multitask MMR head.
# Use same MMR-only splits as Phase 4 baseline for a fair vl_rise comparison.

paths:
  embeddings_dir: "/mnt/data-surgen/embeddings/"
  data_dir: "data/splits/"
  models_dir: "models/"
  logs_dir: "logs/mlflow"
  results_dir: "results/"

data:
  embedding_dim: 1024
  train_split: "SurGen_msi_train.csv"
  val_split: "SurGen_msi_validate.csv"
  test_split: "SurGen_msi_test.csv"
  label_column: "label"
  slide_id_column: "case_id"

model:
  input_dim: 1024
  hidden_dim: 512
  transformer_layers: 2
  num_heads: 2
  ffn_dim: 2048
  dropout: 0.15
  layer_norm_eps: 1.0e-5
  aggregation: "attention"
  attn_hidden_dim: 128
  positional_encoding: "none"
  model_type: "MILTransformer"

training:
  epochs: 150
  lr: 1.0e-5
  batch_size: 1
  optimizer: "adam"
  random_seed: 1
  save_every: 20
  lr_scheduler: "cosine"
  class_weighting: true
  grad_accum_steps: 16
  early_stopping_patience: 25

mlflow:
  experiment_name: "multitask-surgen-phase6"
  tracking_uri: "sqlite:///mlflow.db"
  run_name: "singletask-mmr-abmil-cosine-accum16"

evaluation:
  thresholds: [0.25, 0.50, 0.75]

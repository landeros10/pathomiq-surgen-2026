# Stability study S2 — cosine+warmup, no class weighting, accum_steps=1

paths:
  embeddings_dir: "/mnt/data-surgen/embeddings/"
  data_dir: "data/splits/"
  models_dir: "models/"
  logs_dir: "logs/mlflow"
  results_dir: "results/"

data:
  cohorts:
    - SurGen
  embedding_dim: 1024
  train_split: "SurGen_msi_train.csv"
  val_split: "SurGen_msi_validate.csv"
  test_split: "SurGen_msi_test.csv"
  label_column: "label"
  slide_id_column: "case_id"

model:
  input_dim: 1024
  hidden_dim: 512
  transformer_layers: 2
  num_heads: 2
  ffn_dim: 2048
  dropout: 0.15
  layer_norm_eps: 1.0e-5
  aggregation: "mean"

training:
  epochs: 25
  early_stopping_patience: 5
  lr: 5.0e-5
  batch_size: 1
  optimizer: "adam"
  random_seed: 1
  save_every: 25
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 5
  lr_scheduler_eta_min: 1.0e-6
  lr_scheduler_T_max: 20
  class_weighting: false
  grad_accum_steps: 1

mlflow:
  experiment_name: "mmr-surgen-stability"
  tracking_uri: "sqlite:///mlflow.db"
  run_name: "mmr-surgen-s2-accum1"

evaluation:
  thresholds: [0.0119, 0.25, 0.50, 0.75]

synthetic:
  num_slides: 10
  patches_per_slide: 100
  embedding_dim: 1024
  output_dir: "embeddings/synthetic/"
  data_dir: "data/synthetic/"
  msi_fraction: 0.20
  seed: 42
